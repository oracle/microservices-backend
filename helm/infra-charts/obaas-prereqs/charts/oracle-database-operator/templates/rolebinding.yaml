# Leader election RoleBinding (always required in operator namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "oracle-database-operator.name" . }}-leader-election-rolebinding
  namespace: {{ include "oracle-database-operator.namespace" . }}
  labels:
    {{- include "oracle-database-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "oracle-database-operator.name" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "oracle-database-operator.serviceAccountName" . }}
  namespace: {{ include "oracle-database-operator.namespace" . }}
---
# Manager RoleBinding in operator namespace (always required)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "oracle-database-operator.name" . }}-manager-rolebinding
  namespace: {{ include "oracle-database-operator.namespace" . }}
  labels:
    {{- include "oracle-database-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "oracle-database-operator.name" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "oracle-database-operator.serviceAccountName" . }}
  namespace: {{ include "oracle-database-operator.namespace" . }}
{{- if eq .Values.scope.mode "namespace" }}
{{- range .Values.scope.watchNamespaces }}
---
# Manager RoleBinding for namespace-scoped deployment in {{ . }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "oracle-database-operator.name" $ }}-manager-rolebinding
  namespace: {{ . }}
  labels:
    {{- include "oracle-database-operator.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "oracle-database-operator.name" $ }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "oracle-database-operator.serviceAccountName" $ }}
  namespace: {{ include "oracle-database-operator.namespace" $ }}
{{- end }}
{{- end }}
