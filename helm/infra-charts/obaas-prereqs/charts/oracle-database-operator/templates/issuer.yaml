apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "oracle-database-operator.issuerName" . }}
  namespace: {{ include "oracle-database-operator.namespace" . }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "oracle-database-operator.labels" . | nindent 4 }}
spec:
  selfSigned: {}
