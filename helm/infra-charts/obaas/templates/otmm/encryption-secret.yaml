{{- if .Values.otmm.workflowServer.enabled }}
{{- $name := "encryption-secret" -}}
{{- $ns := .Release.Namespace -}}

{{- $existing := lookup "v1" "Secret" $ns $name -}}
{{- $key := "" -}}

{{- if $existing }}
  {{- $key = index $existing.data "encryption.key" -}}
{{- else }}
  {{- $key = (randAlphaNum 64 | b64enc) -}}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
type: Opaque
data:
  encryption.key: {{ $key | quote }}
{{- end }}