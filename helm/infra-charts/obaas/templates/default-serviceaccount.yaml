Patch the default ServiceAccount with imagePullSecrets so that pods without
an explicit serviceAccountName (e.g. signoz schema-migrator sync Job) can
pull images from private registries.

Uses a pre-install/pre-upgrade hook to kubectl-patch the existing default SA
rather than declaring it as a Helm-managed resource (which would fail because
the default SA already exists in every namespace).
*/}}
{{- $secrets := list -}}
{{- if .Values.global.imagePullSecrets -}}
  {{- $secrets = .Values.global.imagePullSecrets -}}
{{- else if .Values.global.imagePullSecretName -}}
  {{- $secrets = list .Values.global.imagePullSecretName -}}
{{- end -}}
{{- if $secrets }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "obaas.fullname" . }}-patch-default-sa
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
imagePullSecrets:
  {{- range $secrets }}
  {{- if kindIs "string" . }}
  - name: {{ . | quote }}
  {{- else }}
  - {{ toYaml . | nindent 4 | trim }}
  {{- end }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "obaas.fullname" . }}-patch-default-sa
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "obaas.fullname" . }}-patch-default-sa
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "obaas.fullname" . }}-patch-default-sa
subjects:
- kind: ServiceAccount
  name: {{ include "obaas.fullname" . }}-patch-default-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "obaas.fullname" . }}-patch-default-sa-{{ .Release.Revision }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-14"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "obaas.fullname" . }}-patch-default-sa
      containers:
      - name: patch
        image: {{ .Values.global.utilities.kubectl.image.registry }}/{{ .Values.global.utilities.kubectl.image.repository }}:{{ .Values.global.utilities.kubectl.image.tag }}
        command:
        - kubectl
        - patch
        - serviceaccount
        - default
        - -n
        - {{ .Release.Namespace }}
        - -p
        - '{"imagePullSecrets": [{{- range $i, $s := $secrets }}{{- if $i }},{{ end }}{{- if kindIs "string" $s }}{"name":"{{ $s }}"}{{- else }}{"name":"{{ $s.name }}"}{{- end }}{{- end }}]}'
{{- end }}
