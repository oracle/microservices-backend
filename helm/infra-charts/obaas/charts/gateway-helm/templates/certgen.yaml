apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "eg.fullname" . }}-certgen
  namespace: {{ .Release.Namespace | quote }}
  labels:
{{ include "eg.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install, pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
{{- with .Values.certgen.job.annotations }}
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
  backoffLimit: 1
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: certgen
{{- with .Values.certgen.job.pod.labels }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.certgen.job.pod.annotations }}
      annotations:
{{ toYaml . | nindent 8 }}
{{- end }}
    spec:
      {{- $args := .Values.certgen.job.args -}}
      {{- if not .Values.topologyInjector.enabled -}}
      {{- $args = append $args "--disable-topology-injector" -}}
      {{- end }}

      containers:
        - name: envoy-gateway-certgen
          image: {{ include "eg.image" . }}
          imagePullPolicy: {{ include "eg.image.pullPolicy" . }}
          command:
            - envoy-gateway
            - certgen
{{- if $args }}
          args:
{{ toYaml $args | nindent 12 }}
{{- end }}
          env:
            - name: ENVOY_GATEWAY_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: KUBERNETES_CLUSTER_DOMAIN
              value: {{ .Values.kubernetesClusterDomain }}
{{- with .Values.certgen.job.resources }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}
          securityContext:
{{ toYaml .Values.certgen.job.securityContext | nindent 12 }}

{{ include "eg.image.pullSecrets" . | nindent 6 }}

{{- with .Values.certgen.job.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.certgen.job.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.certgen.job.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
{{- end }}
      restartPolicy: Never
      serviceAccountName: {{ include "eg.fullname" . }}-certgen
{{- if not (kindIs "invalid" .Values.certgen.job.ttlSecondsAfterFinished) }}
  ttlSecondsAfterFinished: {{ .Values.certgen.job.ttlSecondsAfterFinished }}
{{- end }}